server {
    listen 3001;
    root /usr/share/nginx/html;
    index index.html;

    # Canonical host (www -> non-www)
    if ($host = www.matchapp.fr) {
        return 301 https://matchapp.fr$request_uri;
    }

    # Canonicalize trailing slash for non-root routes
    location ~ ^/(.+)/+$ {
        return 301 /$1$is_args$args;
    }

    # Proxy API requests to backend container
    location ^~ /api/ {
        proxy_pass http://match-api:8008/api/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Cache immutable hashed assets aggressively
    location ^~ /assets/ {
        try_files $uri =404;
        expires 1y;
        add_header Cache-Control "public, max-age=31536000, immutable" always;
    }

    # Public indexable SPA routes
    location = / {
        try_files /index.html =404;
    }

    location ~ ^/(presentation|public-referral|terms|privacy|terms-of-sale)$ {
        try_files /index.html =404;
    }

    # Private / auth / utility routes are rendered by SPA but should not be indexed
    location ~ ^/(login|register|forgot-password|onboarding(?:/(?:add-venue|info|billing|confirmation|payment-required))?|dashboard|matches(?:/schedule)?|my-matches(?:/[^/]+(?:/edit)?)?|my-venues(?:/(?:add(?:/(?:info|billing|confirmation))?|[^/]+(?:/edit)?))?|boost(?:/purchase)?|referral|my-reviews|account(?:/(?:info|billing|notifications|security|data|help))?|reservations|notifications|qr-scanner)$ {
        add_header X-Robots-Tag "noindex, nofollow" always;
        try_files /index.html =404;
    }

    # Static files only; unknown paths must return true 404 (prevents soft-404)
    location / {
        try_files $uri $uri/ =404;
    }
}
