server {
    listen 3001;
    server_name www.matchapp.fr;
    return 301 https://matchapp.fr$request_uri;
}

server {
    listen 3001;
    server_name matchapp.fr;
    root /usr/share/nginx/html;
    index index.html;

    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "camera=(), microphone=(), geolocation=(), payment=()" always;
    add_header Cross-Origin-Opener-Policy "same-origin" always;
    add_header Cross-Origin-Resource-Policy "same-site" always;
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains; preload" always;

    gzip on;
    gzip_comp_level 5;
    gzip_min_length 1024;
    gzip_proxied any;
    gzip_types text/plain text/css application/javascript application/json application/xml image/svg+xml;

    # Canonicalize trailing slash for non-root routes
    location ~ ^/(.+)/+$ {
        return 301 /$1$is_args$args;
    }

    # Proxy API requests to backend container
    location ^~ /api/ {
        add_header X-Robots-Tag "noindex, nofollow" always;
        proxy_pass http://match-api:8008/api/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Cache immutable hashed assets aggressively
    location ^~ /assets/ {
        try_files $uri =404;
        expires 1y;
        add_header Cache-Control "public, max-age=31536000, immutable" always;
    }

    # Cache non-hashed static files aggressively (icons, images, fonts)
    location ~* \.(?:png|jpg|jpeg|gif|webp|avif|svg|ico|woff2?|ttf|eot)$ {
        try_files $uri =404;
        expires 30d;
        add_header Cache-Control "public, max-age=2592000, immutable" always;
    }

    location = /robots.txt {
        try_files $uri =404;
        expires 1h;
        add_header Cache-Control "public, max-age=3600, must-revalidate" always;
    }

    location = /sitemap.xml {
        try_files $uri =404;
        expires 1h;
        add_header Cache-Control "public, max-age=3600, must-revalidate" always;
    }

    # Public indexable SPA routes
    location = / {
        try_files /index.html =404;
    }

    location ~ ^/(presentation|public-referral|terms|privacy|terms-of-sale)$ {
        try_files $uri $uri/ =404;
    }

    # Private / auth / utility routes are rendered by SPA but should not be indexed
    location ~ ^/(login|register|forgot-password|onboarding(?:/(?:add-venue|info|billing|confirmation|payment-required))?|dashboard|matches(?:/schedule)?|my-matches(?:/[^/]+(?:/edit)?)?|my-venues(?:/(?:add(?:/(?:info|billing|confirmation))?|[^/]+(?:/edit)?))?|boost(?:/purchase)?|referral|my-reviews|account(?:/(?:info|billing|notifications|security|data|help))?|reservations|notifications|qr-scanner)$ {
        add_header X-Robots-Tag "noindex, nofollow" always;
        try_files /index.html =404;
    }

    # Static files only; unknown paths must return true 404 (prevents soft-404)
    location / {
        try_files $uri $uri/ =404;
    }
}
